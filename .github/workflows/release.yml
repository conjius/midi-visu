name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version and bump patch
        id: version
        run: |
          # Read current version from CMakeLists.txt
          CURRENT=$(sed -n 's/.*project(midi-visu VERSION \([0-9]*\.[0-9]*\.[0-9]*\)).*/\1/p' CMakeLists.txt)
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          # Bump patch
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"

          # Update CMakeLists.txt
          sed -i '' "s/project(midi-visu VERSION ${CURRENT})/project(midi-visu VERSION ${NEW_VERSION})/" CMakeLists.txt

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CMakeLists.txt
          git commit -m "Bump version to ${{ steps.version.outputs.tag }}"
          git push

      - name: Tag release
        run: |
          git tag -a ${{ steps.version.outputs.tag }} -m "Release ${{ steps.version.outputs.tag }}"
          git push origin ${{ steps.version.outputs.tag }}

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ../../Downloads/JUCE
          key: juce-8.0.12

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          mkdir -p ../../Downloads
          git clone --depth 1 --branch 8.0.12 https://github.com/juce-framework/JUCE.git ../../Downloads/JUCE

      - name: Configure (Release)
        run: cmake -B cmake-build-release -DCMAKE_BUILD_TYPE=Release

      - name: Build Standalone
        run: cmake --build cmake-build-release --target midi-visu_Standalone --config Release

      - name: Build VST3
        run: cmake --build cmake-build-release --target midi-visu_VST3 --config Release

      - name: Zip Standalone
        run: |
          cd cmake-build-release/midi-visu_artefacts/Release/Standalone
          zip -r "$GITHUB_WORKSPACE/midi-visu-Standalone.zip" midi-visu.app

      - name: Zip VST3
        run: |
          cd cmake-build-release/midi-visu_artefacts/Release/VST3
          zip -r "$GITHUB_WORKSPACE/midi-visu-VST3.zip" midi-visu.vst3

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: midi-visu ${{ steps.version.outputs.tag }}
          body: |
            **Artifacts:**
            - `midi-visu-Standalone.zip` — macOS standalone app
            - `midi-visu-VST3.zip` — VST3 plugin
          files: |
            midi-visu-Standalone.zip
            midi-visu-VST3.zip
