name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache JUCE
        id: cache-juce
        uses: actions/cache@v4
        with:
          path: ../../Downloads/JUCE
          key: juce-8.0.6

      - name: Clone JUCE
        if: steps.cache-juce.outputs.cache-hit != 'true'
        run: |
          mkdir -p ../../Downloads
          git clone --depth 1 --branch 8.0.6 https://github.com/juce-framework/JUCE.git ../../Downloads/JUCE

      - name: Configure
        run: cmake -B cmake-build-debug -DCMAKE_BUILD_TYPE=Debug

      - name: Build standalone
        run: cmake --build cmake-build-debug --target midi-visu_Standalone

      - name: Build tests
        run: cmake --build cmake-build-debug --target midi-visu-tests

      - name: Run tests
        run: cd cmake-build-debug && ctest --output-on-failure
